<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Concepts // Tarot + 8-Ball</title>
<link rel="stylesheet" href="../css/main.css">
<style>
	:root {
		--card-w: 92px;
		--card-h: 152px;
	}

	body { padding: 24px 16px 80px; }

	.preview-grid {
		display: grid;
		gap: 28px;
		max-width: 760px;
		margin: 0 auto;
	}

	.preview-panel {
		display: grid;
		gap: 14px;
	}

	.preview-eyebrow {
		font-family: var(--mono);
		font-size: 0.72rem;
		letter-spacing: 0.2em;
		text-transform: uppercase;
		color: var(--text-dim);
		margin: 0;
	}

	.preview-title {
		margin: 0;
		font-family: var(--display);
	}

	.preview-actions {
		display: flex;
		gap: 10px;
		flex-wrap: wrap;
	}

	/* ============ TAROT FAN ============ */
	.tarot-stage {
		position: relative;
		height: 240px;
		display: grid;
		place-items: end center;
		padding-bottom: 6px;
		background:
			radial-gradient(ellipse at 50% 110%, rgba(255, 122, 238, 0.18) 0%, transparent 60%),
			linear-gradient(180deg, #050414 0%, #0b0820 100%);
		border: 1px solid rgba(255, 122, 238, 0.3);
		border-radius: 10px;
		overflow: hidden;
	}

	.tarot-stage::before {
		content: '';
		position: absolute;
		inset: 0;
		background: repeating-linear-gradient(
			0deg,
			rgba(0, 0, 0, 0.25) 0px,
			rgba(0, 0, 0, 0.25) 1px,
			transparent 1px,
			transparent 4px
		);
		mix-blend-mode: multiply;
		pointer-events: none;
	}

	.tarot-fan {
		position: relative;
		width: 100%;
		height: 100%;
	}

	.tarot-card {
		position: absolute;
		left: 50%;
		bottom: 12px;
		width: var(--card-w);
		height: var(--card-h);
		margin-left: calc(var(--card-w) / -2);
		transform-origin: 50% calc(100% + 60px);
		transform: rotate(var(--rot, 0deg));
		border: 1px solid rgba(255, 122, 238, 0.55);
		border-radius: 6px;
		background:
			radial-gradient(circle at 50% 30%, rgba(255, 209, 102, 0.18) 0%, transparent 65%),
			linear-gradient(160deg, #1a0830 0%, #0a0418 100%);
		box-shadow:
			0 0 0 1px rgba(0, 0, 0, 0.6) inset,
			0 6px 14px rgba(0, 0, 0, 0.5);
		display: grid;
		grid-template-rows: auto 1fr auto;
		padding: 8px 6px;
		text-align: center;
		cursor: pointer;
		transition: transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 200ms ease;
	}

	.tarot-card:hover,
	.tarot-card:focus-visible {
		transform: rotate(var(--rot, 0deg)) translateY(-18px) scale(1.04);
		box-shadow:
			0 0 0 1px rgba(255, 209, 102, 0.6) inset,
			0 0 18px rgba(255, 122, 238, 0.45),
			0 10px 22px rgba(0, 0, 0, 0.6);
		z-index: 5;
		outline: none;
	}

	.tarot-card.is-revealed {
		animation: tarot-flip 0.6s ease-out;
	}

	@keyframes tarot-flip {
		0% { transform: rotate(var(--rot, 0deg)) scale(0.9) rotateY(180deg); }
		100% { transform: rotate(var(--rot, 0deg)) scale(1) rotateY(0deg); }
	}

	.tarot-roman {
		font-family: var(--mono);
		font-size: 0.6rem;
		letter-spacing: 0.18em;
		color: var(--text-dim);
	}

	.tarot-glyph {
		display: grid;
		place-items: center;
		font-size: 1.8rem;
		line-height: 1;
		color: var(--luck);
		text-shadow: 0 0 10px rgba(255, 209, 102, 0.6);
	}

	.tarot-name {
		font-family: var(--display);
		font-size: 0.72rem;
		letter-spacing: 0.06em;
		color: var(--text);
		line-height: 1.1;
	}

	/* Tone variants */
	.tarot-card.is-gloom { border-color: rgba(255, 122, 238, 0.7); }
	.tarot-card.is-gloom .tarot-glyph { color: var(--gloom); text-shadow: 0 0 10px rgba(255, 122, 238, 0.7); }
	.tarot-card.is-luckdust { border-color: rgba(255, 209, 102, 0.7); }
	.tarot-card.is-luckdust .tarot-glyph { color: var(--luck); }
	.tarot-card.is-plague { border-color: rgba(255, 92, 122, 0.85); }
	.tarot-card.is-plague .tarot-glyph { color: #ff5c7a; text-shadow: 0 0 12px rgba(255, 92, 122, 0.7); }
	.tarot-card.is-nothing { border-color: rgba(120, 120, 140, 0.6); opacity: 0.78; }
	.tarot-card.is-nothing .tarot-glyph { color: var(--text-dim); text-shadow: none; }

	.tarot-readout {
		min-height: 56px;
		padding: 10px 12px;
		border: 1px solid rgba(255, 122, 238, 0.25);
		background: rgba(10, 4, 24, 0.7);
		font-family: var(--mono);
		font-size: 0.78rem;
		color: var(--text);
		display: grid;
		gap: 4px;
	}

	.tarot-readout-label {
		font-size: 0.65rem;
		letter-spacing: 0.16em;
		color: var(--gloom);
	}

	/* ============ DREAD ORACLE (Pessimistic Pals re-skin) ============ */

	.dread-bezel {
		position: relative;
		display: grid;
		gap: 10px;
		justify-items: center;
		padding: 18px 18px 14px;
		background:
			linear-gradient(180deg, #0a0414 0%, #06030d 100%);
		border: 1px solid rgba(255, 122, 238, 0.35);
		border-radius: 14px;
		box-shadow:
			inset 0 0 24px rgba(255, 122, 238, 0.08),
			inset 0 0 2px rgba(255, 122, 238, 0.25),
			0 0 16px rgba(255, 122, 238, 0.08);
	}

	/* Bolt-corner pixels for the relic vibe */
	.dread-bezel::before,
	.dread-bezel::after {
		content: '';
		position: absolute;
		width: 5px;
		height: 5px;
		background: var(--gloom, #ff7aee);
		box-shadow: 0 0 6px rgba(255, 122, 238, 0.7);
	}
	.dread-bezel::before { top: 6px; left: 6px; }
	.dread-bezel::after { top: 6px; right: 6px; }

	.dread-bezel-bolts {
		position: absolute;
		inset: 0;
		pointer-events: none;
	}
	.dread-bezel-bolts::before,
	.dread-bezel-bolts::after {
		content: '';
		position: absolute;
		width: 5px;
		height: 5px;
		background: var(--gloom, #ff7aee);
		box-shadow: 0 0 6px rgba(255, 122, 238, 0.7);
	}
	.dread-bezel-bolts::before { bottom: 6px; left: 6px; }
	.dread-bezel-bolts::after { bottom: 6px; right: 6px; }

	.dread-label {
		font-family: var(--mono);
		font-size: 0.62rem;
		letter-spacing: 0.22em;
		text-transform: uppercase;
		color: var(--gloom, #ff7aee);
		text-shadow: 0 0 8px rgba(255, 122, 238, 0.5);
		margin: 0;
	}

	.dread-hint {
		font-family: var(--mono);
		font-size: 0.62rem;
		letter-spacing: 0.16em;
		text-transform: uppercase;
		color: var(--text-dim);
		margin: 0;
		text-align: center;
	}

	.eightball-stage {
		position: relative;
		display: grid;
		place-items: center;
		padding: 32px 0 36px;
		background:
			radial-gradient(ellipse at 50% 60%, rgba(255, 122, 238, 0.10) 0%, transparent 70%),
			linear-gradient(180deg, #08040f 0%, #0d061a 100%);
		border: 1px solid rgba(255, 122, 238, 0.25);
		border-radius: 8px;
		perspective: 900px;
		perspective-origin: 50% 30%;
		overflow: hidden;
		width: 100%;
	}

	/* Pink fog drifting up from below the orb */
	.eightball-fog {
		position: absolute;
		inset: 0;
		pointer-events: none;
		background:
			radial-gradient(ellipse 80% 30% at 30% 100%, rgba(255, 122, 238, 0.18) 0%, transparent 70%),
			radial-gradient(ellipse 60% 25% at 75% 110%, rgba(255, 122, 238, 0.12) 0%, transparent 65%);
		animation: dread-fog-drift 8s ease-in-out infinite;
		mix-blend-mode: screen;
	}

	@keyframes dread-fog-drift {
		0%, 100% { transform: translateY(0) scale(1); opacity: 0.9; }
		50% { transform: translateY(-8px) scale(1.06); opacity: 1; }
	}

	/* Floating dread specks — orbit lazily */
	.dread-speck {
		position: absolute;
		width: 2px;
		height: 2px;
		background: var(--gloom, #ff7aee);
		border-radius: 50%;
		box-shadow: 0 0 4px rgba(255, 122, 238, 0.85);
		pointer-events: none;
		animation: speck-drift 7s linear infinite;
	}
	.dread-speck:nth-child(2) { animation-duration: 9s; animation-delay: -2s; left: 30%; }
	.dread-speck:nth-child(3) { animation-duration: 11s; animation-delay: -5s; left: 70%; }
	.dread-speck:nth-child(4) { animation-duration: 8s; animation-delay: -3s; left: 18%; }
	.dread-speck:nth-child(5) { animation-duration: 10s; animation-delay: -7s; left: 82%; }

	@keyframes speck-drift {
		0% { bottom: -10px; opacity: 0; transform: translateX(0); }
		15% { opacity: 1; }
		85% { opacity: 0.8; }
		100% { bottom: 110%; opacity: 0; transform: translateX(20px); }
	}

	.eightball-stage.is-shaking { animation: stage-quake 0.18s ease-in-out 8; }
	@keyframes stage-quake {
		0%, 100% { transform: translate(0, 0); }
		25% { transform: translate(-2px, 1px); }
		50% { transform: translate(2px, -1px); }
		75% { transform: translate(-1px, -2px); }
	}

	.eightball-shadow {
		position: absolute;
		bottom: 22px;
		left: 50%;
		width: 200px;
		height: 28px;
		transform: translateX(-50%);
		background: radial-gradient(ellipse at center, rgba(255, 122, 238, 0.45) 0%, rgba(0, 0, 0, 0) 70%);
		filter: blur(10px);
		pointer-events: none;
		transition: transform 200ms ease, opacity 200ms ease;
	}

	.eightball-stage.is-shaking .eightball-shadow {
		animation: eightball-shadow-shake 0.5s ease-in-out 3;
	}

	@keyframes eightball-shadow-shake {
		0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 1; }
		50% { transform: translateX(-50%) scaleX(0.85); opacity: 0.7; }
	}

	.eightball {
		position: relative;
		width: 240px;
		height: 240px;
		border-radius: 50%;
		transform-style: preserve-3d;
		cursor: pointer;
		animation: eightball-float 5s ease-in-out infinite;
		transition: transform 240ms ease;
	}

	@keyframes eightball-float {
		0%, 100% { transform: translateY(0) rotateX(8deg) rotateY(-6deg); }
		50% { transform: translateY(-6px) rotateX(6deg) rotateY(6deg); }
	}

	.eightball:hover { animation-play-state: paused; }

	/* Anxious idle glitch every ~10s */
	.eightball.is-glitching { animation: dread-glitch 0.4s steps(4) 1 !important; }
	@keyframes dread-glitch {
		0%, 100% { transform: translateY(0) rotateX(8deg) rotateY(-6deg) translateX(0); filter: none; }
		25% { transform: translateY(0) rotateX(8deg) rotateY(-6deg) translateX(-3px); filter: hue-rotate(20deg); }
		50% { transform: translateY(0) rotateX(8deg) rotateY(-6deg) translateX(3px); filter: hue-rotate(-15deg); }
		75% { transform: translateY(0) rotateX(8deg) rotateY(-6deg) translateX(-1px); filter: none; }
	}

	.eightball.is-shaking {
		animation: eightball-shake-3d 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97) 3 !important;
	}

	@keyframes eightball-shake-3d {
		0%, 100% { transform: translate3d(0, 0, 0) rotateX(8deg) rotateY(0deg) rotateZ(0deg); }
		15% { transform: translate3d(-10px, -5px, 0) rotateX(0deg) rotateY(-14deg) rotateZ(-5deg); }
		35% { transform: translate3d(8px, 6px, 0) rotateX(16deg) rotateY(12deg) rotateZ(4deg); }
		55% { transform: translate3d(-6px, 4px, 0) rotateX(4deg) rotateY(-10deg) rotateZ(-3deg); }
		75% { transform: translate3d(5px, -6px, 0) rotateX(14deg) rotateY(8deg) rotateZ(2deg); }
	}

	/* Sphere body — gloom crystal, not billiard */
	.eightball-body {
		position: absolute;
		inset: 0;
		border-radius: 50%;
		background:
			radial-gradient(circle at 50% 50%, #2a0e3a 0%, #100620 55%, #04020a 100%);
		box-shadow:
			0 22px 50px rgba(0, 0, 0, 0.7),
			0 0 30px rgba(255, 122, 238, 0.18),
			inset 0 -30px 60px rgba(0, 0, 0, 0.85),
			inset 0 14px 40px rgba(255, 122, 238, 0.06),
			0 0 0 2px rgba(255, 122, 238, 0.18);
	}

	.eightball-body::after {
		content: '';
		position: absolute;
		inset: 0;
		border-radius: 50%;
		background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(0, 0, 0, 0.6) 95%);
		pointer-events: none;
	}

	/* Phosphor equator — like the orb is wired into a CRT */
	.eightball-equator {
		position: absolute;
		top: 50%;
		left: 0;
		right: 0;
		height: 1px;
		transform: translateY(-50%) translateZ(2px);
		background: linear-gradient(
			90deg,
			transparent 5%,
			rgba(15, 255, 140, 0.45) 25%,
			rgba(15, 255, 140, 0.65) 50%,
			rgba(15, 255, 140, 0.45) 75%,
			transparent 95%
		);
		box-shadow: 0 0 6px rgba(15, 255, 140, 0.5);
		opacity: 0.75;
		pointer-events: none;
	}

	/* Specular highlights */
	.eightball-glare {
		position: absolute;
		top: 14%;
		left: 22%;
		width: 38%;
		height: 26%;
		border-radius: 50%;
		background: radial-gradient(ellipse at center, rgba(255, 200, 245, 0.4) 0%, rgba(255, 122, 238, 0.08) 45%, transparent 70%);
		transform: translateZ(40px) rotate(-22deg);
		filter: blur(2px);
		pointer-events: none;
	}

	.eightball-glare-small {
		position: absolute;
		top: 22%;
		left: 60%;
		width: 14%;
		height: 8%;
		border-radius: 50%;
		background: radial-gradient(ellipse at center, rgba(255, 240, 255, 0.55) 0%, transparent 70%);
		transform: translateZ(50px);
		filter: blur(1.5px);
		pointer-events: none;
	}

	/* CRT readout window */
	.eightball-window {
		position: absolute;
		top: 50%;
		left: 50%;
		width: 120px;
		height: 120px;
		margin: -60px 0 0 -60px;
		border-radius: 50%;
		transform: translateZ(28px);
		background:
			radial-gradient(circle at 50% 60%, #2a1240 0%, #150622 55%, #04020a 100%);
		box-shadow:
			inset 0 0 24px rgba(0, 0, 0, 0.85),
			inset 0 6px 10px rgba(255, 122, 238, 0.12),
			0 0 0 2px rgba(0, 0, 0, 0.5),
			0 0 0 3px rgba(15, 255, 140, 0.18);
		display: grid;
		place-items: center;
		overflow: hidden;
	}

	/* Scanlines */
	.eightball-window::before {
		content: '';
		position: absolute;
		inset: 0;
		border-radius: 50%;
		background:
			repeating-linear-gradient(
				0deg,
				rgba(0, 0, 0, 0.4) 0px,
				rgba(0, 0, 0, 0.4) 1px,
				transparent 1px,
				transparent 3px
			),
			radial-gradient(ellipse at 30% 22%, rgba(255, 200, 240, 0.18) 0%, transparent 45%);
		mix-blend-mode: multiply;
		pointer-events: none;
		z-index: 3;
	}

	/* Pink/purple gloom mist swirl */
	.eightball-window::after {
		content: '';
		position: absolute;
		inset: -10%;
		background:
			radial-gradient(circle at 30% 70%, rgba(255, 122, 238, 0.4) 0%, transparent 40%),
			radial-gradient(circle at 70% 30%, rgba(120, 40, 160, 0.55) 0%, transparent 50%);
		filter: blur(8px);
		opacity: 0.7;
		pointer-events: none;
		animation: mist-swirl 6s ease-in-out infinite;
	}

	@keyframes mist-swirl {
		0%, 100% { transform: translate(0, 0) scale(1); }
		33% { transform: translate(-3%, 2%) scale(1.05); }
		66% { transform: translate(3%, -2%) scale(1.03); }
	}

	.eightball.is-shaking .eightball-window::after {
		animation: ink-slosh 1.65s ease-in-out;
	}

	@keyframes ink-slosh {
		0% { transform: translate(0, 0) scale(1); }
		25% { transform: translate(-10%, 8%) scale(1.15); }
		50% { transform: translate(8%, -10%) scale(1.08); }
		75% { transform: translate(-5%, 5%) scale(1.1); }
		100% { transform: translate(0, 0) scale(1); }
	}

	/* Sigil coin (replaces blue triangle) */
	.eightball-coin {
		position: relative;
		width: 56px;
		height: 56px;
		border-radius: 50%;
		background:
			radial-gradient(circle at 50% 35%, #ffd166 0%, #b8821e 60%, #5a3a08 100%);
		box-shadow:
			inset 0 -4px 6px rgba(0, 0, 0, 0.5),
			inset 0 3px 4px rgba(255, 240, 200, 0.4),
			0 0 12px rgba(255, 209, 102, 0.35);
		display: grid;
		place-items: center;
		font-family: var(--mono);
		font-size: 1.4rem;
		font-weight: 700;
		color: #2a1a04;
		text-shadow: 0 1px 0 rgba(255, 240, 200, 0.5);
		transform-origin: center;
		opacity: 0;
	}

	.eightball.is-shaking .eightball-coin {
		animation: coin-tumble 1.65s cubic-bezier(0.4, 0, 0.6, 1);
	}

	@keyframes coin-tumble {
		0%   { transform: translateY(30px) rotateY(0deg) rotateZ(0deg); opacity: 0; }
		15%  { transform: translateY(-8px) rotateY(180deg) rotateZ(80deg); opacity: 0.6; }
		35%  { transform: translateY(12px) rotateY(360deg) rotateZ(160deg); opacity: 0.8; }
		55%  { transform: translateY(-4px) rotateY(540deg) rotateZ(240deg); opacity: 0.9; }
		75%  { transform: translateY(6px) rotateY(720deg) rotateZ(320deg); opacity: 1; }
		100% { transform: translateY(0) rotateY(720deg) rotateZ(360deg); opacity: 1; }
	}

	.eightball-text {
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%) translateZ(30px);
		width: 100px;
		font-family: var(--mono);
		font-size: 0.66rem;
		font-weight: 700;
		letter-spacing: 0.08em;
		text-transform: uppercase;
		color: var(--crt-phosphor, #0fff8c);
		text-align: center;
		line-height: 1.18;
		text-shadow:
			-1px 0 0 rgba(255, 80, 200, 0.55),
			1px 0 0 rgba(80, 240, 255, 0.45),
			0 0 4px rgba(15, 255, 140, 0.85),
			0 0 10px rgba(15, 255, 140, 0.4);
		pointer-events: none;
		opacity: 0;
		transition: opacity 200ms ease;
	}

	.eightball-text.is-visible { opacity: 1; }
	.eightball-text.is-visible::after {
		content: '█';
		display: inline-block;
		margin-left: 2px;
		animation: dread-cursor 1s steps(2) infinite;
	}
	@keyframes dread-cursor {
		0%, 50% { opacity: 1; }
		50.01%, 100% { opacity: 0; }
	}

	.eightball.is-shaking .eightball-text { opacity: 0.2; }

	/* Tone glow on the answer */
	.eightball-text.is-gloom { color: var(--gloom); text-shadow: -1px 0 0 rgba(255, 80, 200, 0.6), 1px 0 0 rgba(80, 240, 255, 0.4), 0 0 4px rgba(255, 122, 238, 0.85), 0 0 12px rgba(255, 122, 238, 0.45); }
	.eightball-text.is-luckdust { color: var(--luck); text-shadow: -1px 0 0 rgba(255, 200, 100, 0.55), 1px 0 0 rgba(255, 240, 180, 0.4), 0 0 4px rgba(255, 209, 102, 0.9), 0 0 12px rgba(255, 209, 102, 0.4); }
	.eightball-text.is-plague { color: #ff5c7a; text-shadow: -1px 0 0 rgba(255, 30, 80, 0.6), 1px 0 0 rgba(255, 200, 200, 0.4), 0 0 4px rgba(255, 92, 122, 0.9), 0 0 14px rgba(255, 92, 122, 0.5); }
	.eightball-text.is-nothing { color: var(--text-dim); text-shadow: none; }

	/* Tone-keyed window flash on reveal */
	.eightball-window.is-flash-gloom,
	.eightball-window.is-flash-plague {
		animation: window-flash-red 0.6s ease-out;
	}
	.eightball-window.is-flash-luckdust { animation: window-flash-luck 0.7s ease-out; }
	@keyframes window-flash-red {
		0% { box-shadow: inset 0 0 24px rgba(255, 60, 100, 0.9), 0 0 0 3px rgba(255, 60, 100, 0.7), 0 0 24px rgba(255, 60, 100, 0.6); }
		100% { box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.85), 0 0 0 2px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(15, 255, 140, 0.18); }
	}
	@keyframes window-flash-luck {
		0% { box-shadow: inset 0 0 24px rgba(255, 209, 102, 0.9), 0 0 0 3px rgba(255, 209, 102, 0.7), 0 0 30px rgba(255, 209, 102, 0.6); }
		100% { box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.85), 0 0 0 2px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(15, 255, 140, 0.18); }
	}

	.eightball-hint {
		font-family: var(--mono);
		font-size: 0.7rem;
		color: var(--text-dim);
		text-align: center;
		margin-top: 12px;
		letter-spacing: 0.14em;
	}

	@media (prefers-reduced-motion: reduce) {
		.eightball, .eightball-window::after, .eightball-fog, .dread-speck { animation: none !important; }
	}
</style>
</head>
<body data-page="oracle-preview">
	<header class="page-header">
		<a class="back-link" href="home.html">&lt; back</a>
		<h1 class="page-title">Oracle Concepts</h1>
		<p class="page-subtitle">Tarot Fan vs. Magic 8-Ball — pick a vibe</p>
	</header>

	<div class="preview-grid">

		<!-- TAROT FAN -->
		<section class="panel preview-panel">
			<div>
				<p class="preview-eyebrow">Concept 01</p>
				<h2 class="preview-title">Tarot Fan</h2>
			</div>

			<div class="tarot-stage">
				<div class="tarot-fan" data-tarot-fan></div>
			</div>

			<div class="tarot-readout">
				<span class="tarot-readout-label" data-tarot-label>HOVER A CARD</span>
				<span data-tarot-effect>Each card hides a fate. Click one to draw.</span>
			</div>

			<div class="preview-actions">
				<button class="action-button" data-tarot-shuffle>Shuffle &amp; Draw</button>
				<button class="ghost-link" data-tarot-reset>Reset Fan</button>
			</div>
		</section>

		<!-- DREAD ORACLE (Magic 8-Ball reskin) -->
		<section class="panel preview-panel">
			<div>
				<p class="preview-eyebrow">Concept 02</p>
				<h2 class="preview-title">Dread Oracle</h2>
			</div>

			<div class="dread-bezel">
				<p class="dread-label">DREAD ORACLE // MK.II</p>
				<div class="dread-bezel-bolts" aria-hidden="true"></div>
				<div class="eightball-stage" data-eightball-stage>
					<div class="eightball-fog" aria-hidden="true"></div>
					<div class="dread-speck" aria-hidden="true"></div>
					<div class="dread-speck" aria-hidden="true"></div>
					<div class="dread-speck" aria-hidden="true"></div>
					<div class="dread-speck" aria-hidden="true"></div>
					<div class="dread-speck" aria-hidden="true"></div>
					<div class="eightball" data-eightball role="button" tabindex="0" aria-label="Consult the Dread Oracle">
						<div class="eightball-body"></div>
						<div class="eightball-equator"></div>
						<div class="eightball-glare"></div>
						<div class="eightball-glare-small"></div>
						<div class="eightball-window" data-eightball-window>
							<div class="eightball-coin" data-eightball-coin></div>
							<div class="eightball-text" data-eightball-text>WHY ASK</div>
						</div>
					</div>
					<div class="eightball-shadow"></div>
				</div>
				<p class="dread-hint" data-eightball-hint>The void answers. Sometimes.</p>
			</div>

			<div class="preview-actions">
				<button class="action-button" data-eightball-shake>Consult Anyway</button>
			</div>
		</section>

	</div>

<script>
(function() {
	const SEGMENTS = [
		{ id: 'gloom_6',     label: '+6 Gloom',    short: 'GLOOM x6',  glyph: '☠', tone: 'gloom',    effect: 'A fat slab of dread lands in your lap.' },
		{ id: 'gloom_4',     label: '+4 Gloom',    short: 'GLOOM x4',  glyph: '☁', tone: 'gloom',    effect: 'Mid-tier malaise. Manageable.' },
		{ id: 'gloom_2',     label: '+2 Gloom',    short: 'GLOOM x2',  glyph: '·',  tone: 'gloom',    effect: 'A papercut of sadness.' },
		{ id: 'luckdust_1',  label: '+1 Luckdust', short: 'LUCK +1',   glyph: '✦', tone: 'luckdust', effect: 'A speckle of fortune.' },
		{ id: 'luckdust_2',  label: '+2 Luckdust', short: 'LUCK +2',   glyph: '✧', tone: 'luckdust', effect: 'Decent sparkle, friend.' },
		{ id: 'nothing_1',   label: 'Nothing',     short: 'NOTHING',   glyph: '○', tone: 'nothing',  effect: 'The void shrugs.' },
		{ id: 'nothing_2',   label: 'Nothing',     short: 'NOTHING',   glyph: '○', tone: 'nothing',  effect: 'Still nothing. Bleak.' },
		{ id: 'plague',      label: 'Plague',      short: 'PLAGUE',    glyph: '✶', tone: 'plague',   effect: 'Your pal coughs up something concerning.' },
	];

	// ============ TAROT FAN ============
	const fan = document.querySelector('[data-tarot-fan]');
	const tarotLabel = document.querySelector('[data-tarot-label]');
	const tarotEffect = document.querySelector('[data-tarot-effect]');

	function renderFan() {
		fan.innerHTML = '';
		const count = SEGMENTS.length;
		const spread = 70; // total degrees
		const step = spread / (count - 1);
		const start = -spread / 2;

		SEGMENTS.forEach((seg, i) => {
			const rot = start + step * i;
			const card = document.createElement('button');
			card.type = 'button';
			card.className = `tarot-card is-${seg.tone}`;
			card.style.setProperty('--rot', `${rot}deg`);
			card.style.zIndex = String(i);
			card.dataset.segId = seg.id;
			card.innerHTML = `
				<span class="tarot-roman">${toRoman(i + 1)}</span>
				<span class="tarot-glyph">${seg.glyph}</span>
				<span class="tarot-name">${seg.short}</span>
			`;
			card.addEventListener('mouseenter', () => showTarot(seg));
			card.addEventListener('focus', () => showTarot(seg));
			card.addEventListener('click', () => drawCard(card, seg));
			fan.appendChild(card);
		});
	}

	function showTarot(seg) {
		tarotLabel.textContent = seg.label.toUpperCase();
		tarotEffect.textContent = seg.effect;
	}

	function drawCard(card, seg) {
		document.querySelectorAll('.tarot-card.is-revealed').forEach((n) => n.classList.remove('is-revealed'));
		card.classList.add('is-revealed');
		showTarot(seg);
	}

	function toRoman(n) {
		const map = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
		return map[n - 1] || String(n);
	}

	document.querySelector('[data-tarot-shuffle]').addEventListener('click', () => {
		// Shuffle visual order then auto-pick.
		SEGMENTS.sort(() => Math.random() - 0.5);
		renderFan();
		const cards = fan.querySelectorAll('.tarot-card');
		const pickIdx = Math.floor(Math.random() * cards.length);
		const seg = SEGMENTS[pickIdx];
		setTimeout(() => drawCard(cards[pickIdx], seg), 200);
	});

	document.querySelector('[data-tarot-reset]').addEventListener('click', () => {
		document.querySelectorAll('.tarot-card.is-revealed').forEach((n) => n.classList.remove('is-revealed'));
		tarotLabel.textContent = 'HOVER A CARD';
		tarotEffect.textContent = 'Each card hides a fate. Click one to draw.';
	});

	renderFan();

	// ============ DREAD ORACLE ============
	const ball = document.querySelector('[data-eightball]');
	const ballStage = document.querySelector('[data-eightball-stage]');
	const ballWindow = document.querySelector('[data-eightball-window]');
	const ballText = document.querySelector('[data-eightball-text]');
	const ballCoin = document.querySelector('[data-eightball-coin]');
	const ballHint = document.querySelector('[data-eightball-hint]');

	const RELUCTANT_IDLE = ['WHY ASK', "DON'T", 'ASK ANYWAY', 'FINE', 'IF YOU MUST', 'ENOUGH'];
	const THINKING = ['THINKING...', 'REGRETTING...', 'CALCULATING DOOM...', 'CONSULTING VOID...', 'PROCESSING DREAD...'];
	const COIN_GLYPHS = { gloom: '☠', luckdust: '✦', plague: '☣', nothing: '○', unique: '✧' };

	let idleIdx = 0;
	function rotateIdleCopy() {
		if (ball.classList.contains('is-shaking') || ballText.classList.contains('is-visible')) return;
		idleIdx = (idleIdx + 1) % RELUCTANT_IDLE.length;
		ballText.textContent = RELUCTANT_IDLE[idleIdx];
	}
	setInterval(rotateIdleCopy, 3500);

	// Anxious glitch every ~10s
	setInterval(() => {
		if (ball.classList.contains('is-shaking')) return;
		ball.classList.add('is-glitching');
		setTimeout(() => ball.classList.remove('is-glitching'), 420);
	}, 10000);

	// Tilt parallax
	ballStage.addEventListener('mousemove', (e) => {
		if (ball.classList.contains('is-shaking')) return;
		const rect = ballStage.getBoundingClientRect();
		const x = (e.clientX - rect.left) / rect.width - 0.5;
		const y = (e.clientY - rect.top) / rect.height - 0.5;
		ball.style.animation = 'none';
		ball.style.transform = `rotateX(${-y * 18}deg) rotateY(${x * 22}deg) translateZ(0)`;
	});

	ballStage.addEventListener('mouseleave', () => {
		if (ball.classList.contains('is-shaking')) return;
		ball.style.animation = '';
		ball.style.transform = '';
	});

	function shake() {
		if (ball.classList.contains('is-shaking')) return;
		ball.style.animation = '';
		ball.style.transform = '';
		ball.classList.add('is-shaking');
		ballStage.classList.add('is-shaking');
		ballText.classList.remove('is-visible');
		ballText.classList.remove('is-gloom', 'is-luckdust', 'is-plague', 'is-nothing');
		ballWindow.classList.remove('is-flash-gloom', 'is-flash-plague', 'is-flash-luckdust');
		// Pre-pick the result so the coin can tumble during the shake
		const result = SEGMENTS[Math.floor(Math.random() * SEGMENTS.length)];
		ballCoin.textContent = COIN_GLYPHS[result.tone] || '?';
		ballCoin.style.transition = 'none';
		ballCoin.style.opacity = '';
		ballHint.textContent = THINKING[Math.floor(Math.random() * THINKING.length)];

		const cycle = setInterval(() => {
			const peek = SEGMENTS[Math.floor(Math.random() * SEGMENTS.length)];
			ballText.textContent = peek.short;
		}, 90);

		setTimeout(() => {
			clearInterval(cycle);
			ball.classList.remove('is-shaking');
			ballStage.classList.remove('is-shaking');

			// Fade coin out as text reveals
			ballCoin.style.transition = 'opacity 280ms ease';
			ballCoin.style.opacity = '0';

			// Tone flash on the window
			if (result.tone === 'plague' || result.tone === 'gloom') {
				ballWindow.classList.add('is-flash-' + result.tone);
			} else if (result.tone === 'luckdust') {
				ballWindow.classList.add('is-flash-luckdust');
			}

			ballText.textContent = result.short;
			ballText.classList.add('is-visible', `is-${result.tone}`);
			ballHint.textContent = result.effect;
		}, 1650);
	}

	ball.addEventListener('click', shake);
	ball.addEventListener('keydown', (e) => {
		if (e.key === 'Enter' || e.key === ' ') {
			e.preventDefault();
			shake();
		}
	});
	document.querySelector('[data-eightball-shake]').addEventListener('click', shake);
})();
</script>
</body>
</html>
